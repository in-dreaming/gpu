<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 720">
  <title>通用 GPU 层 L0-L9 分层架构图</title>
  
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#94a3b8"/>
    </marker>
  </defs>
  
  <rect width="100%" height="100%" fill="#ffffff"/>
  
  <!-- L9 Future AI -->
  <g class="layer-l9">
    <text x="100" y="50" text-anchor="end" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#ec4899">L9 Future AI</text>
    <rect x="120" y="20" width="600" height="50" fill="none" stroke="#ec4899" stroke-width="1.5" rx="6"/>
    
    <rect x="140" y="30" width="120" height="30" fill="#fdf2f8" stroke="#ec4899" stroke-width="1" rx="4"/>
    <text x="200" y="50" text-anchor="middle" font-family="'SF Mono', Consolas, monospace" font-size="12" font-weight="500" fill="#be185d">GpuTensor</text>
    
    <rect x="280" y="30" width="160" height="30" fill="#fdf2f8" stroke="#ec4899" stroke-width="1" rx="4"/>
    <text x="360" y="50" text-anchor="middle" font-family="'SF Mono', Consolas, monospace" font-size="12" font-weight="500" fill="#be185d">GpuMatrixPipeline</text>
  </g>
  
  <line x1="420" y1="70" x2="420" y2="85" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- L8 Capability -->
  <g class="layer-l8">
    <text x="100" y="115" text-anchor="end" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#64748b">L8 Capability</text>
    <rect x="120" y="85" width="600" height="50" fill="none" stroke="#94a3b8" stroke-width="1.5" rx="6"/>
    
    <rect x="140" y="95" width="160" height="30" fill="#f8fafc" stroke="#94a3b8" stroke-width="1" rx="4"/>
    <text x="220" y="115" text-anchor="middle" font-family="'SF Mono', Consolas, monospace" font-size="12" font-weight="500" fill="#475569">GpuCapabilities</text>
  </g>

  <line x1="420" y1="135" x2="420" y2="150" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- L7 Backend -->
  <g class="layer-l7">
    <text x="100" y="180" text-anchor="end" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#1e40af">L7 Backend</text>
    <rect x="120" y="150" width="600" height="50" fill="none" stroke="#1e40af" stroke-width="1.5" rx="6"/>
    
    <rect x="140" y="160" width="120" height="30" fill="#eff6ff" stroke="#1e40af" stroke-width="1" rx="4"/>
    <text x="200" y="180" text-anchor="middle" font-family="'SF Mono', Consolas, monospace" font-size="12" font-weight="500" fill="#1e3a8a">Slang-RHI</text>
    
    <rect x="280" y="160" width="140" height="30" fill="#eff6ff" stroke="#1e40af" stroke-width="1" rx="4"/>
    <text x="350" y="180" text-anchor="middle" font-family="'SF Mono', Consolas, monospace" font-size="12" font-weight="500" fill="#1e3a8a">WebGPU Extension</text>
    
    <rect x="440" y="160" width="140" height="30" fill="#eff6ff" stroke="#1e40af" stroke-width="1" rx="4"/>
    <text x="510" y="180" text-anchor="middle" font-family="'SF Mono', Consolas, monospace" font-size="12" font-weight="500" fill="#1e3a8a">Console Extension</text>
  </g>

  <line x1="420" y1="200" x2="420" y2="215" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- L6 Resource Layout -->
  <g class="layer-l6">
    <text x="100" y="245" text-anchor="end" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#8b5cf6">L6 Layout</text>
    <rect x="120" y="215" width="600" height="50" fill="none" stroke="#8b5cf6" stroke-width="1.5" rx="6"/>
    
    <rect x="140" y="225" width="140" height="30" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1" rx="4"/>
    <text x="210" y="245" text-anchor="middle" font-family="'SF Mono', Consolas, monospace" font-size="12" font-weight="500" fill="#5b21b6">ParameterBlock</text>
    
    <rect x="300" y="225" width="140" height="30" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1" rx="4"/>
    <text x="370" y="245" text-anchor="middle" font-family="'SF Mono', Consolas, monospace" font-size="12" font-weight="500" fill="#5b21b6">MaterialLayout</text>
  </g>

  <line x1="420" y1="265" x2="420" y2="280" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- L5 Pipeline -->
  <g class="layer-l5">
    <text x="100" y="310" text-anchor="end" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#f59e0b">L5 Pipeline</text>
    <rect x="120" y="280" width="600" height="50" fill="none" stroke="#f59e0b" stroke-width="1.5" rx="6"/>
    
    <rect x="140" y="290" width="100" height="30" fill="#fffbeb" stroke="#f59e0b" stroke-width="1" rx="4"/>
    <text x="190" y="310" text-anchor="middle" font-family="'SF Mono', Consolas, monospace" font-size="12" font-weight="500" fill="#b45309">Graphics</text>
    
    <rect x="250" y="290" width="100" height="30" fill="#fffbeb" stroke="#f59e0b" stroke-width="1" rx="4"/>
    <text x="300" y="310" text-anchor="middle" font-family="'SF Mono', Consolas, monospace" font-size="12" font-weight="500" fill="#b45309">Compute</text>
    
    <rect x="360" y="290" width="100" height="30" fill="#fffbeb" stroke="#f59e0b" stroke-width="1" rx="4"/>
    <text x="410" y="310" text-anchor="middle" font-family="'SF Mono', Consolas, monospace" font-size="12" font-weight="500" fill="#b45309">Mesh</text>
    
    <rect x="470" y="290" width="120" height="30" fill="#fffbeb" stroke="#f59e0b" stroke-width="1" rx="4"/>
    <text x="530" y="310" text-anchor="middle" font-family="'SF Mono', Consolas, monospace" font-size="12" font-weight="500" fill="#b45309">RayTracing</text>
  </g>

  <line x1="420" y1="330" x2="420" y2="345" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- L4 Bindless -->
  <g class="layer-l4">
    <text x="100" y="375" text-anchor="end" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#10b981">L4 Bindless</text>
    <rect x="120" y="345" width="600" height="50" fill="none" stroke="#10b981" stroke-width="1.5" rx="6"/>
    
    <rect x="140" y="355" width="140" height="30" fill="#ecfdf5" stroke="#10b981" stroke-width="1" rx="4"/>
    <text x="210" y="375" text-anchor="middle" font-family="'SF Mono', Consolas, monospace" font-size="12" font-weight="500" fill="#047857">GpuBindlessHeap</text>
    
    <rect x="300" y="355" width="120" height="30" fill="#ecfdf5" stroke="#10b981" stroke-width="1" rx="4"/>
    <text x="360" y="375" text-anchor="middle" font-family="'SF Mono', Consolas, monospace" font-size="12" font-weight="500" fill="#047857">TextureHandle</text>
    
    <rect x="440" y="355" width="120" height="30" fill="#ecfdf5" stroke="#10b981" stroke-width="1" rx="4"/>
    <text x="500" y="375" text-anchor="middle" font-family="'SF Mono', Consolas, monospace" font-size="12" font-weight="500" fill="#047857">BufferHandle</text>
  </g>

  <line x1="420" y1="395" x2="420" y2="410" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- L3 Resource -->
  <g class="layer-l3">
    <text x="100" y="440" text-anchor="end" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#0891b2">L3 Resource</text>
    <rect x="120" y="410" width="600" height="50" fill="none" stroke="#0891b2" stroke-width="1.5" rx="6"/>
    
    <rect x="140" y="420" width="100" height="30" fill="#ecfeff" stroke="#0891b2" stroke-width="1" rx="4"/>
    <text x="190" y="440" text-anchor="middle" font-family="'SF Mono', Consolas, monospace" font-size="12" font-weight="500" fill="#0e7490">GpuBuffer</text>
    
    <rect x="250" y="420" width="100" height="30" fill="#ecfeff" stroke="#0891b2" stroke-width="1" rx="4"/>
    <text x="300" y="440" text-anchor="middle" font-family="'SF Mono', Consolas, monospace" font-size="12" font-weight="500" fill="#0e7490">GpuTexture</text>
    
    <rect x="360" y="420" width="120" height="30" fill="#ecfeff" stroke="#0891b2" stroke-width="1" rx="4"/>
    <text x="420" y="440" text-anchor="middle" font-family="'SF Mono', Consolas, monospace" font-size="12" font-weight="500" fill="#0e7490">Handle System</text>
    
    <rect x="490" y="420" width="100" height="30" fill="#ecfeff" stroke="#0891b2" stroke-width="1" rx="4"/>
    <text x="540" y="440" text-anchor="middle" font-family="'SF Mono', Consolas, monospace" font-size="12" font-weight="500" fill="#0e7490">Streaming</text>
  </g>

  <line x1="420" y1="460" x2="420" y2="475" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- L2 Reflection -->
  <g class="layer-l2">
    <text x="100" y="505" text-anchor="end" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#6366f1">L2 Reflection</text>
    <rect x="120" y="475" width="600" height="50" fill="none" stroke="#6366f1" stroke-width="1.5" rx="6"/>
    
    <rect x="140" y="485" width="120" height="30" fill="#eef2ff" stroke="#6366f1" stroke-width="1" rx="4"/>
    <text x="200" y="505" text-anchor="middle" font-family="'SF Mono', Consolas, monospace" font-size="12" font-weight="500" fill="#4338ca">GpuTypeInfo</text>
    
    <rect x="280" y="485" width="120" height="30" fill="#eef2ff" stroke="#6366f1" stroke-width="1" rx="4"/>
    <text x="340" y="505" text-anchor="middle" font-family="'SF Mono', Consolas, monospace" font-size="12" font-weight="500" fill="#4338ca">AutoBinding</text>
    
    <rect x="420" y="485" width="100" height="30" fill="#eef2ff" stroke="#6366f1" stroke-width="1" rx="4"/>
    <text x="470" y="505" text-anchor="middle" font-family="'SF Mono', Consolas, monospace" font-size="12" font-weight="500" fill="#4338ca">Inspector</text>
  </g>

  <line x1="420" y1="525" x2="420" y2="540" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- L1 Shader -->
  <g class="layer-l1">
    <text x="100" y="570" text-anchor="end" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#3b82f6">L1 Shader</text>
    <rect x="120" y="540" width="600" height="50" fill="none" stroke="#3b82f6" stroke-width="1.5" rx="6"/>
    
    <rect x="140" y="550" width="140" height="30" fill="#eff6ff" stroke="#3b82f6" stroke-width="1" rx="4"/>
    <text x="210" y="570" text-anchor="middle" font-family="'SF Mono', Consolas, monospace" font-size="12" font-weight="500" fill="#1e40af">Slang Compiler</text>
    
    <rect x="300" y="550" width="280" height="30" fill="#eff6ff" stroke="#3b82f6" stroke-width="1" rx="4"/>
    <text x="440" y="570" text-anchor="middle" font-family="'SF Mono', Consolas, monospace" font-size="12" font-weight="500" fill="#1e40af">Multi-Backend (SPIRV/DXIL/MSL/WGSL)</text>
  </g>

  <line x1="420" y1="590" x2="420" y2="605" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- L0 Runtime -->
  <g class="layer-l0">
    <text x="100" y="635" text-anchor="end" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#059669">L0 Runtime</text>
    <rect x="120" y="605" width="600" height="50" fill="none" stroke="#059669" stroke-width="1.5" rx="6"/>
    
    <rect x="140" y="615" width="120" height="30" fill="#f0fdf4" stroke="#059669" stroke-width="1" rx="4"/>
    <text x="200" y="635" text-anchor="middle" font-family="'SF Mono', Consolas, monospace" font-size="12" font-weight="500" fill="#065f46">GpuDevice</text>
    
    <rect x="280" y="615" width="100" height="30" fill="#f0fdf4" stroke="#059669" stroke-width="1" rx="4"/>
    <text x="330" y="635" text-anchor="middle" font-family="'SF Mono', Consolas, monospace" font-size="12" font-weight="500" fill="#065f46">GpuQueue</text>
    
    <rect x="400" y="615" width="160" height="30" fill="#f0fdf4" stroke="#059669" stroke-width="1" rx="4"/>
    <text x="480" y="635" text-anchor="middle" font-family="'SF Mono', Consolas, monospace" font-size="12" font-weight="500" fill="#065f46">GpuCommandBuffer</text>
  </g>

  <!-- 右侧阶段分组 -->
  <g class="stage-groups">
    <!-- 第三阶段 -->
    <rect x="740" y="20" width="200" height="180" fill="none" stroke="#ec4899" stroke-width="1.5" stroke-dasharray="6,3" rx="8"/>
    <text x="840" y="100" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#be185d">第三阶段 (L7-L9)</text>
    <text x="840" y="120" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#be185d">AI/RT扩展</text>

    <!-- 第二阶段 -->
    <rect x="740" y="215" width="200" height="115" fill="none" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="6,3" rx="8"/>
    <text x="840" y="265" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#b45309">第二阶段 (L5-L6)</text>
    <text x="840" y="285" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#b45309">Mesh Shader+Multi Queue</text>

    <!-- 第一阶段 -->
    <rect x="740" y="345" width="200" height="310" fill="none" stroke="#10b981" stroke-width="1.5" stroke-dasharray="6,3" rx="8"/>
    <text x="840" y="480" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#047857">第一阶段 (L0-L4)</text>
    <text x="840" y="505" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#047857">Bindless+Capability</text>
    <text x="840" y="525" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#047857">+ShaderObject</text>
  </g>
</svg>